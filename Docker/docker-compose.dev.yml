services:
  db:
    image: postgres:16
    container_name: postgresDB_Gradox2_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: gradox
      POSTGRES_PASSWORD: gradox-local-password
      POSTGRES_DB: gradoxdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: eclipse-temurin:21-jdk
    container_name: gradox2_app_dev
    working_dir: /workspace/gradox2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gradoxdb
      SPRING_DATASOURCE_USERNAME: gradox
      SPRING_DATASOURCE_PASSWORD: gradox-local-password
      JWT_SECRET: local-dev-jwt-secret-min-32-bytes-long
      JWT_EXPIRATION: 86400000
      SPRING_MAIL_HOST: localhost
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: ""
      SPRING_MAIL_PASSWORD: ""
      SPRING_PROFILES_ACTIVE: local
    command: ["bash", "-lc", "chmod +x mvnw && ./mvnw spring-boot:run -Dspring-boot.run.profiles=local"]
    volumes:
      - ../gradox2:/workspace/gradox2
      - m2-cache:/root/.m2
    ports:
      - "8080:8080"

volumes:
  pgdata-dev:
  m2-cache:
